server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: bakery-order-delivery

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/bakery_order_delivery?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

bakery:
  daily-inventory:
    key-prefix: "bakery:inventory:"
    close-hour: 18
